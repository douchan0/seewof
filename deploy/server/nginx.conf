# /etc/nginx/sites-available/seewof
#
# 将此文件软链到 sites-enabled:
#   sudo ln -s /etc/nginx/sites-available/seewof /etc/nginx/sites-enabled/seewof
# 自签证书 (内网):
#   openssl req -x509 -newkey rsa:4096 -nodes \
#     -keyout /etc/ssl/private/seewof-selfsigned.key \
#     -out /etc/ssl/certs/seewof-selfsigned.crt \
#     -days 3650 -subj "/CN=seewof-server"
# Let's Encrypt (公网):
#   sudo certbot --nginx -d seewof.example.com
#

# 将 HTTP 重定向到 HTTPS (取消注释启用)
# server {
#     listen 80;
#     server_name seewof.example.com;
#     return 301 https://$host$request_uri;
# }

server {
    listen 8443 ssl http2;
    server_name seewof.example.com _;

    # === TLS 配置 ===
    ssl_certificate     /etc/ssl/certs/seewof-selfsigned.crt;       # 自签 / Let's Encrypt
    ssl_certificate_key /etc/ssl/private/seewof-selfsigned.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # === 上传大小 ===
    client_max_body_size 4m;

    # === 安全头 ===
    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    # 注意: 同源部署, CSP 可严格
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self';" always;

    # === 日志 ===
    access_log /var/log/nginx/seewof.access.log;
    error_log  /var/log/nginx/seewof.error.log warn;

    # === 教室端 Agent API ===
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    # === 静态前端 (Vue 3 SPA) ===
    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
    }

    # === 健康检查 (绕过代理) ===
    location = /api/v1/health {
        proxy_pass http://127.0.0.1:8000;
        access_log off;
    }
}
